name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # allows manual trigger from GitHub Actions tab

# Sets permissions so the action can deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Optional: bust cache by injecting build timestamp ──────────
      - name: Inject build timestamp
        run: |
          TS=$(date +%s%3N)
          sed -i "s/const BUILD_TS = '.*'/const BUILD_TS = '${TS}'/" mock.js || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repo root (all HTML, JS, CSS, JSON)
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
